<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州撲克記帳本</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ========================================== -->
    <!-- 1. CSS 區塊 (如果你要拆分，可以把這段移到 style.css) -->
    <!-- ========================================== -->
    <style>
        /* 隱藏數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* 自定義滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans pb-24 selection:bg-blue-500/30">

    <!-- ========================================== -->
    <!-- 2. HTML 結構區塊                             -->
    <!-- ========================================== -->
    
    <!-- 頂部導航與統計 -->
    <header class="bg-slate-800 p-4 sticky top-0 z-10 shadow-lg border-b border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold text-yellow-500 flex items-center gap-2">
                <i data-lucide="dollar-sign" class="w-6 h-6"></i>
                德州撲克記帳本
            </h1>
            <div class="flex gap-3">
                <button onclick="copyResults()" class="text-slate-400 hover:text-white transition-colors relative" title="複製結算表">
                    <span id="copy-icon"><i data-lucide="copy" class="w-5 h-5"></i></span>
                </button>
                <button onclick="resetGame()" class="text-slate-400 hover:text-red-400 transition-colors" title="重置遊戲">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-slate-700/50 p-3 rounded-xl border border-slate-600/30">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">總池底 (Total Pot)</div>
                <div id="total-buyin-display" class="text-2xl font-mono text-green-400 font-bold">$0</div>
            </div>
            <div class="bg-slate-700/50 p-3 rounded-xl border border-slate-600/30">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">場上籌碼 (On Table)</div>
                <div id="total-stack-display" class="text-2xl font-mono font-bold text-blue-400">$0</div>
            </div>
        </div>
        
        <!-- 狀態提示區 -->
        <div id="status-message-container" class="mt-3 empty:hidden"></div>
    </header>

    <!-- 玩家列表 -->
    <main id="players-container" class="p-4 space-y-4">
        <!-- 玩家卡片會由 JavaScript 動態生成注入這裡 -->
    </main>

    <!-- 新增玩家按鈕 -->
    <div class="px-4 mt-2">
        <button onclick="addPlayer()" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 hover:text-slate-200 hover:border-slate-500 hover:bg-slate-800/50 transition-all flex items-center justify-center gap-2 font-medium">
            <i data-lucide="users" class="w-5 h-5"></i> 新增玩家
        </button>
    </div>

    <!-- 金額輸入 Modal -->
    <div id="action-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity">
        <div class="bg-slate-800 w-full sm:w-96 rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden transform transition-transform translate-y-0">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-center p-5 border-b border-slate-700 bg-slate-800/80">
                <h3 id="modal-title" class="text-lg font-bold text-white flex items-center gap-2">
                    籌碼異動
                </h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-700 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-6">
                <div class="text-center mb-6">
                    <div id="modal-player-name" class="text-sm text-slate-400 mb-2">玩家名稱</div>
                    
                    <!-- 增加/減少 切換 (僅限買入模式顯示) -->
                    <div id="toggle-subtract-container" class="flex justify-center mb-4">
                        <button id="toggle-subtract-btn" onclick="toggleSubtract()" class="flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-blue-500/20 text-blue-400 border border-blue-500/30">
                            <i data-lucide="arrow-right-left" class="w-3.5 h-3.5"></i>
                            <span id="toggle-subtract-text">目前模式：增加 (+)</span>
                        </button>
                    </div>

                    <div class="relative flex justify-center items-center">
                        <span id="amount-prefix" class="text-3xl font-light mr-2 text-slate-500">$</span>
                        <input
                            type="number"
                            id="temp-amount-input"
                            value=""
                            placeholder="0"
                            oninput="updateTempAmount(this.value)"
                            class="w-48 bg-transparent text-center text-5xl font-mono font-bold text-white placeholder-slate-600 focus:outline-none"
                        />
                    </div>
                </div>

                <!-- 快速按鈕區 -->
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button onclick="addAmount(10)" class="py-3 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-xl font-mono font-bold transition-all active:scale-95 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">+10</button>
                    <button onclick="addAmount(50)" class="py-3 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-xl font-mono font-bold transition-all active:scale-95 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">+50</button>
                    <button onclick="addAmount(100)" class="py-3 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-xl font-mono font-bold transition-all active:scale-95 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">+100</button>
                    <button onclick="addAmount(200)" class="py-3 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-xl font-mono font-bold transition-all active:scale-95 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">+200</button>
                    <button onclick="addAmount(500)" class="py-3 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-xl font-mono font-bold transition-all active:scale-95 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">+500</button>
                    <button onclick="addAmount(1000)" class="py-3 bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-xl font-mono font-bold transition-all active:scale-95 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">+1000</button>
                </div>

                <!-- 清除按鈕 -->
                <div class="flex justify-end mb-4">
                   <button onclick="updateTempAmount('')" class="text-sm text-slate-400 hover:text-white px-3 py-1 rounded-lg hover:bg-slate-700 transition-colors">
                    歸零重填
                  </button>
                </div>

                <!-- 確認按鈕 -->
                <button
                    id="submit-transaction-btn"
                    onclick="submitTransaction()"
                    class="w-full py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white"
                >
                    <i data-lucide="save" class="w-5 h-5"></i>
                    <span id="submit-btn-text">確認買入</span>
                </button>
            </div>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- 3. JavaScript 邏輯區塊 (如果要拆分，移到 script.js) -->
    <!-- ========================================== -->
    <script>
        // --- 狀態管理 ---
        let players = [
            { id: 1, name: '玩家 1', buyIn: 0, stack: 0, isCashedOut: false },
            { id: 2, name: '玩家 2', buyIn: 0, stack: 0, isCashedOut: false },
            { id: 3, name: '玩家 3', buyIn: 0, stack: 0, isCashedOut: false },
            { id: 4, name: '玩家 4', buyIn: 0, stack: 0, isCashedOut: false },
        ];

        let selectedPlayerId = null;
        let modalMode = 'buyIn'; // 'buyIn' 或 'cashOut'
        let tempAmount = '';
        let isSubtract = false;

        // --- 初始化 ---
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

        // --- 核心渲染函數 ---
        function render() {
            renderHeader();
            renderPlayers();
            renderModal();
            lucide.createIcons(); // 重新渲染圖示
        }

        // --- 渲染頭部數據 ---
        function renderHeader() {
            const totalBuyIn = players.reduce((acc, p) => acc + p.buyIn, 0);
            const totalStack = players.reduce((acc, p) => acc + p.stack, 0);
            const allCashedOut = players.length > 0 && players.every(p => p.isCashedOut);
            const isBalanceCorrect = totalStack === totalBuyIn;
            const hasCashedOutPlayers = players.some(p => p.isCashedOut);

            document.getElementById('total-buyin-display').innerText = `$${totalBuyIn.toLocaleString()}`;
            
            const stackDisplay = document.getElementById('total-stack-display');
            stackDisplay.innerText = `$${totalStack.toLocaleString()}`;
            stackDisplay.className = `text-2xl font-mono font-bold ${!isBalanceCorrect ? 'text-yellow-400' : 'text-blue-400'}`;

            const statusContainer = document.getElementById('status-message-container');
            if (hasCashedOutPlayers) {
                if (!isBalanceCorrect) {
                    statusContainer.innerHTML = `
                        <div class="flex items-center justify-center gap-2 text-xs text-orange-400 bg-orange-400/10 py-2 rounded-lg border border-orange-400/20">
                            <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                            場上籌碼與總買入不符 (差額: ${totalStack - totalBuyIn})
                        </div>`;
                } else if (allCashedOut) {
                    statusContainer.innerHTML = `
                        <div class="flex items-center justify-center gap-2 text-xs text-green-400 bg-green-400/10 py-2 rounded-lg border border-green-400/20">
                            <i data-lucide="check" class="w-3.5 h-3.5"></i>
                            所有人已結算，帳目正確！
                        </div>`;
                } else {
                    statusContainer.innerHTML = '';
                }
            } else {
                statusContainer.innerHTML = '';
            }
        }

        // --- 渲染玩家列表 ---
        function renderPlayers() {
            const container = document.getElementById('players-container');
            container.innerHTML = ''; // 清空重新生成

            players.forEach(player => {
                const net = player.stack - player.buyIn;
                const isWinning = net > 0;
                const isLosing = net < 0;

                let borderColor = 'border-blue-500';
                if (player.isCashedOut) {
                    if (isWinning) borderColor = 'border-green-500';
                    else if (isLosing) borderColor = 'border-red-500';
                    else borderColor = 'border-slate-500';
                }

                let netDisplayHTML = '';
                if (player.isCashedOut) {
                    const netColor = isWinning ? 'text-green-400' : (isLosing ? 'text-red-400' : 'text-slate-400');
                    const sign = net > 0 ? '+' : '';
                    netDisplayHTML = `<span class="text-2xl font-mono font-bold ${netColor}">${sign}${net.toLocaleString()}</span>`;
                } else {
                    netDisplayHTML = `<span class="inline-block text-xs font-medium text-blue-300 bg-blue-500/20 px-2 py-1 rounded-md mt-1 border border-blue-500/20">遊戲中</span>`;
                }

                const cashOutBtnClass = player.isCashedOut 
                    ? 'bg-green-900/30 hover:bg-green-900/50 text-green-400 border border-green-800/50' 
                    : 'bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-slate-100';

                const cardHTML = `
                    <div class="relative bg-slate-800 rounded-xl p-4 shadow-md border-l-4 ${borderColor} transition-all duration-300">
                        <button onclick="removePlayer(${player.id})" class="absolute top-3 right-3 text-slate-500 hover:text-red-400 transition-colors p-1 rounded-md hover:bg-slate-700/50">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>

                        <div class="flex justify-between items-start mb-4 pr-8">
                            <div>
                                <input 
                                    type="text" 
                                    value="${player.name}"
                                    onchange="updatePlayerName(${player.id}, this.value)"
                                    class="bg-transparent font-bold text-lg text-white border-b border-transparent hover:border-slate-600 focus:border-blue-500 focus:outline-none w-36 transition-all"
                                />
                                <div class="text-sm text-slate-400 mt-1 flex items-center gap-1">
                                    總投入: <span class="text-slate-200 font-mono">$${player.buyIn.toLocaleString()}</span>
                                </div>
                            </div>
                            
                            <div class="text-right">
                                <div class="text-xs text-slate-400 mb-1">淨利 (Net)</div>
                                ${netDisplayHTML}
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mt-2">
                            <button onclick="openModal(${player.id}, 'buyIn')" class="flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-slate-100 py-2.5 rounded-lg transition-colors text-sm font-medium">
                                <i data-lucide="plus" class="w-4 h-4"></i> ${player.buyIn > 0 ? '追加/修正' : '買入籌碼'}
                            </button>
                            <button onclick="openModal(${player.id}, 'cashOut')" class="flex items-center justify-center gap-2 py-2.5 rounded-lg transition-colors text-sm font-medium ${cashOutBtnClass}">
                                <i data-lucide="calculator" class="w-4 h-4"></i> ${player.isCashedOut ? '修改結算' : '結算離桌'}
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- 渲染 Modal 狀態 ---
        function renderModal() {
            const modal = document.getElementById('action-modal');
            
            if (!selectedPlayerId) {
                modal.classList.add('hidden');
                return;
            }

            const currentPlayer = players.find(p => p.id === selectedPlayerId);
            if (!currentPlayer) return;

            modal.classList.remove('hidden');
            
            // 更新文字與樣式
            document.getElementById('modal-title').innerText = modalMode === 'buyIn' ? '籌碼異動 (Buy In)' : '結算籌碼 (Cash Out)';
            document.getElementById('modal-player-name').innerText = currentPlayer.name;
            
            // 處理 +/- 切換顯示
            const toggleContainer = document.getElementById('toggle-subtract-container');
            const toggleBtn = document.getElementById('toggle-subtract-btn');
            const toggleText = document.getElementById('toggle-subtract-text');
            const amountPrefix = document.getElementById('amount-prefix');
            const submitBtn = document.getElementById('submit-transaction-btn');
            const submitBtnText = document.getElementById('submit-btn-text');

            if (modalMode === 'buyIn') {
                toggleContainer.classList.remove('hidden');
                if (isSubtract) {
                    toggleBtn.className = "flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-red-500/20 text-red-400 border border-red-500/30";
                    toggleText.innerText = "目前模式：扣除 (-)";
                    amountPrefix.innerText = "-";
                    amountPrefix.className = "text-3xl font-light mr-2 text-red-400";
                    
                    submitBtn.className = "w-full py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 bg-red-600 hover:bg-red-500 text-white";
                    submitBtnText.innerText = "確認扣除";
                } else {
                    toggleBtn.className = "flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-blue-500/20 text-blue-400 border border-blue-500/30";
                    toggleText.innerText = "目前模式：增加 (+)";
                    amountPrefix.innerText = "$";
                    amountPrefix.className = "text-3xl font-light mr-2 text-slate-500";

                    submitBtn.className = "w-full py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white";
                    submitBtnText.innerText = "確認買入";
                }
            } else {
                toggleContainer.classList.add('hidden');
                amountPrefix.innerText = "$";
                amountPrefix.className = "text-3xl font-light mr-2 text-slate-500";
                
                submitBtn.className = "w-full py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 bg-green-600 hover:bg-green-500 text-white";
                submitBtnText.innerText = "確認結算";
            }

            // 更新輸入框
            document.getElementById('temp-amount-input').value = tempAmount;
        }

        // --- 操作行為 ---
        function addPlayer() {
            const newId = players.length > 0 ? Math.max(...players.map(p => p.id)) + 1 : 1;
            players.push({ 
                id: newId, 
                name: `玩家 ${newId}`, 
                buyIn: 0, 
                stack: 0, 
                isCashedOut: false 
            });
            render();
        }

        function removePlayer(id) {
            if (window.confirm('確定要移除這位玩家嗎？')) {
                players = players.filter(p => p.id !== id);
                render();
            }
        }

        function updatePlayerName(id, newName) {
            const player = players.find(p => p.id === id);
            if (player) {
                player.name = newName;
                // 不呼叫完整 render() 以避免失去焦點，只需在記憶體中更新
            }
        }

        function openModal(id, mode) {
            selectedPlayerId = id;
            modalMode = mode;
            tempAmount = '';
            isSubtract = false;
            renderModal();
            // 自動 focus 輸入框
            setTimeout(() => document.getElementById('temp-amount-input').focus(), 100);
        }

        function closeModal() {
            selectedPlayerId = null;
            tempAmount = '';
            isSubtract = false;
            renderModal();
        }

        function toggleSubtract() {
            isSubtract = !isSubtract;
            renderModal();
        }

        function updateTempAmount(val) {
            tempAmount = val;
        }

        function addAmount(amount) {
            const currentVal = parseInt(tempAmount) || 0;
            tempAmount = (currentVal + amount).toString();
            renderModal();
        }

        function submitTransaction() {
            const amount = parseInt(tempAmount) || 0;
            
            players = players.map(p => {
                if (p.id !== selectedPlayerId) return p;

                if (modalMode === 'buyIn') {
                    const delta = isSubtract ? -amount : amount;
                    return { ...p, buyIn: Math.max(0, p.buyIn + delta), stack: Math.max(0, p.stack + delta), isCashedOut: false };
                } else {
                    return { ...p, stack: Math.max(0, amount), isCashedOut: true };
                }
            });
            
            closeModal();
            render();
        }

        function resetGame() {
            if (window.confirm('確定要重置所有數據嗎？這將清除所有帳目。')) {
                players = players.map(p => ({ ...p, buyIn: 0, stack: 0, isCashedOut: false }));
                render();
            }
        }

        function copyResults() {
            const totalBuyIn = players.reduce((acc, p) => acc + p.buyIn, 0);
            const totalStack = players.reduce((acc, p) => acc + p.stack, 0);
            const isBalanceCorrect = totalStack === totalBuyIn;

            let text = `♠️ 德州撲克結算表 ♥️\n`;
            text += `──────────────\n`;
            text += `💰 總池底: $${totalBuyIn.toLocaleString()}\n`;
            if (!isBalanceCorrect && players.some(p => p.isCashedOut)) {
                text += `⚠️ 帳目誤差: $${(totalStack - totalBuyIn).toLocaleString()}\n`;
            }
            text += `──────────────\n`;
            
            const sortedPlayers = [...players].sort((a, b) => (b.stack - b.buyIn) - (a.stack - a.buyIn));
            
            sortedPlayers.forEach(p => {
                const net = p.stack - p.buyIn;
                const netStr = net > 0 ? `+${net.toLocaleString()}` : net.toLocaleString();
                const statusStr = p.isCashedOut ? netStr : '(未結算)';
                text += `${p.name}: ${statusStr}\n`;
            });

            // 複製到剪貼簿 (使用較為兼容的方法)
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            try {
                document.execCommand('copy');
                const iconContainer = document.getElementById('copy-icon');
                iconContainer.innerHTML = '<i data-lucide="check" class="w-5 h-5 text-green-400"></i>';
                lucide.createIcons();
                setTimeout(() => {
                    iconContainer.innerHTML = '<i data-lucide="copy" class="w-5 h-5"></i>';
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('複製失敗', err);
            }
            document.body.removeChild(el);
        }
    </script>
</body>
</html>
